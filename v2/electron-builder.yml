appId: com.kiroq.app
productName: KiroQ
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: bin
    to: ffmpeg
  - from: bin
    to: bin
  - from: build/icon.ico
    to: build/icon.ico
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
